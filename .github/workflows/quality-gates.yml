name: Quality Gates

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint gate
        run: npm run lint

      - name: Build gate
        run: npm run build

      - name: Smoke gate
        run: npm run smoke

      - name: Snapshot / component gate
        run: npm run check:components
